<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Kunal Saini Portfolio</title>

    <meta name="description" content="Contact Kunal Saini for web development opportunities.">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a href="#main-content" class="skip-link">
        Skip to Main Content
    </a>

    <header>
        <h1>Contact</h1>

        <nav aria-label="Primary Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <section aria-labelledby="contact-heading">

            <h2 id="contact-heading">Get In Touch</h2>

            <form action="#" method="post" aria-label="Contact Form">

                <div>
                    <label for="name">
                        Full Name
                    </label>

                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>

                <div>
                    <label for="email">
                        Email Address
                    </label>

                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>

                <div>
                    <label for="subject">
                        Subject
                    </label>

                    <input type="text" id="subject" name="subject" required>
                </div>

                <div>
                    <label for="message">
                        Message
                    </label>

                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                <div id="btn">
                    <button type="submit">
                        Send Message
                    </button>
                </div>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Kunal Saini. All Rights Reserved.</p>
    </footer>

</body>

</html>
